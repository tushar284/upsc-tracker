<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UPSC">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <title>Answer Writing — Tushar Progress</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="nav-brand">📚 Tushar</span>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="course.html">Course</a>
    <a href="topics.html">Topics</a>
    <a href="answers.html" class="active">Answers</a>
    <a href="current-affairs.html">Curr. Affairs</a>
    <a href="scores.html">Scores</a>
    <a href="notes.html">Notes</a>
  </nav>

  <main>
    <h1>Answer Writing Practice</h1>

    <div class="card-grid" id="answerStats"></div>

    <div class="card">
      <h2>Log New Answer</h2>
      <div class="form-row">
        <div>
          <label>Date</label>
          <input type="date" id="aDate">
        </div>
        <div>
          <label>Topic / Unit</label>
          <input type="text" id="aTopic" placeholder="e.g. Kinship, Evolution">
        </div>
        <div>
          <label>Self Score (1–10)</label>
          <input type="number" id="aScore" min="1" max="10" placeholder="7">
        </div>
      </div>
      <div style="margin-bottom:0.75rem">
        <label>Question</label>
        <textarea id="aQuestion" rows="2" placeholder="Write the question here..."></textarea>
      </div>
      <div style="margin-bottom:0.75rem">
        <label>Notes / Feedback</label>
        <textarea id="aNotes" rows="2" placeholder="What went well? What to improve?"></textarea>
      </div>
      <button class="btn" onclick="addAnswer()">Add Entry</button>
    </div>

    <div class="card">
      <h2>All Entries</h2>
      <div class="filter-bar">
        <input type="text" id="filterTopic" placeholder="Filter by topic..." oninput="renderTable()">
        <select id="filterScore" onchange="renderTable()">
          <option value="">All scores</option>
          <option value="high">High (8–10)</option>
          <option value="mid">Mid (5–7)</option>
          <option value="low">Low (1–4)</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Topic</th><th>Question</th><th>Score</th><th>Notes</th><th></th></tr>
          </thead>
          <tbody id="answerBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script>
    document.getElementById('aDate').value = todayISO();

    function addAnswer() {
      const entry = {
        date: document.getElementById('aDate').value || todayISO(),
        topic: document.getElementById('aTopic').value.trim(),
        question: document.getElementById('aQuestion').value.trim(),
        score: parseInt(document.getElementById('aScore').value) || 0,
        notes: document.getElementById('aNotes').value.trim(),
      };
      if (!entry.topic) { alert('Please enter a topic.'); return; }
      addAnswerLog(entry);
      document.getElementById('aTopic').value = '';
      document.getElementById('aQuestion').value = '';
      document.getElementById('aScore').value = '';
      document.getElementById('aNotes').value = '';
      renderAll();
    }

    function scorePillClass(s) {
      if (s >= 8) return 'high'; if (s >= 5) return 'mid'; return 'low';
    }

    function renderStats() {
      const logs = getAnswerLogs();
      const avg = logs.length ? (logs.reduce((s, l) => s + (l.score || 0), 0) / logs.length).toFixed(1) : '—';
      const thisWeek = logs.filter(l => l.date >= last7Days()[0]).length;
      document.getElementById('answerStats').innerHTML = `
        <div class="stat-card"><div class="value">${logs.length}</div><div class="label">Total Answers</div></div>
        <div class="stat-card"><div class="value">${avg}</div><div class="label">Avg Score</div></div>
        <div class="stat-card"><div class="value">${thisWeek}</div><div class="label">This Week</div></div>`;
    }

    function renderTable() {
      const topicFilter = document.getElementById('filterTopic').value.toLowerCase();
      const scoreFilter = document.getElementById('filterScore').value;
      let logs = getAnswerLogs();
      if (topicFilter) logs = logs.filter(l => l.topic.toLowerCase().includes(topicFilter));
      if (scoreFilter === 'high') logs = logs.filter(l => l.score >= 8);
      else if (scoreFilter === 'mid') logs = logs.filter(l => l.score >= 5 && l.score < 8);
      else if (scoreFilter === 'low') logs = logs.filter(l => l.score < 5);

      const tbody = document.getElementById('answerBody');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No entries yet.</td></tr>';
        return;
      }
      tbody.innerHTML = logs.map(l => `
        <tr>
          <td style="white-space:nowrap">${formatDate(l.date)}</td>
          <td><span class="badge badge-blue">${l.topic}</span></td>
          <td style="max-width:220px;font-size:0.82rem;color:var(--text-muted)">${l.question || '—'}</td>
          <td><div class="score-pill ${scorePillClass(l.score)}">${l.score || '—'}</div></td>
          <td style="max-width:180px;font-size:0.82rem;color:var(--text-muted)">${l.notes || '—'}</td>
          <td><button class="btn btn-sm btn-danger" onclick="del('${l.id}')">✕</button></td>
        </tr>`).join('');
    }

    function del(id) {
      if (confirm('Delete this entry?')) { deleteAnswerLog(id); renderAll(); }
    }

    function renderAll() { renderStats(); renderTable(); }
    renderAll();
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
