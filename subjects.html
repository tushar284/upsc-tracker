  <style>
    .subj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .subj-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid transparent; transition: background 0.15s;
    }
    .subj-header:hover { background: var(--surface2); }
    .subj-header.open { border-bottom-color: var(--border); }
    .subj-title { flex: 1; font-weight: 600; font-size: 1rem; }
    .subj-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
    .subj-pct { font-size: 0.85rem; color: var(--accent); font-weight: 600; min-width: 40px; text-align: right; }
    .subj-body { padding: 0; display: none; }
    .subj-body.open { display: block; }
    .track-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .track-table th { padding: 0.5rem 0.75rem; background: var(--surface2); color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    .track-table th:first-child { text-align: left; }
    .track-table th:not(:first-child) { text-align: center; width: 90px; }
    .track-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .track-table td:first-child { color: var(--text); font-size: 0.85rem; line-height: 1.4; }
    .track-table td:not(:first-child) { text-align: center; }
    .track-table tr:last-child td { border-bottom: none; }
    .track-table tr:hover td { background: var(--surface2); }
    .track-chk { width: 18px; height: 18px; cursor: pointer; }
    .track-chk.class-chk  { accent-color: #6c8ef5; }
    .track-chk.notes-chk  { accent-color: #52c99e; }
    .track-chk.book-chk   { accent-color: #f5a623; }
    .subj-progress-bar { height: 4px; background: var(--border); }
    .subj-progress-fill { height: 4px; transition: width 0.3s; }
    .coach-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 99px; flex-shrink: 0; }
    .cb-done    { background: #183d30; color: var(--accent2); }
    .cb-ongoing { background: #3d2e10; color: var(--accent3); }
    .cb-upcoming{ background: var(--surface2); color: var(--text-muted); }
    .col-header-wrap { display: flex; align-items: center; justify-content: center; gap: 0.3rem; flex-direction: column; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; }
    @media(max-width: 560px) {
      .track-table th:not(:first-child), .track-table td:not(:first-child) { width: 60px; }
      .track-table th .col-label { display: none; }
    }
  </style>

  // ── Storage helpers ────────────────────────────────────────────────────────

  const SP_KEY = 'subj_progress';

  function getSubjProgress() {
    try { return JSON.parse(localStorage.getItem(SP_KEY) || '{}'); } catch { return {}; }
  }

  function toggleSubjItem(topicId, type) {
    const sp = getSubjProgress();
    if (!sp[topicId]) sp[topicId] = {};
    sp[topicId][type] = !sp[topicId][type];
    localStorage.setItem(SP_KEY, JSON.stringify(sp));
    return sp[topicId][type];
  }

  function getSubjItemVal(topicId, type, sp) {
    return !!(sp[topicId] && sp[topicId][type]);
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function pctFor(subj, sp) {
    const total = subj.topics.length * 3;
    if (!total) return 0;
    const done = subj.topics.reduce((n, t) => {
      return n + (getSubjItemVal(t.id,'class',sp)?1:0) + (getSubjItemVal(t.id,'notes',sp)?1:0) + (getSubjItemVal(t.id,'book',sp)?1:0);
    }, 0);
    return Math.round((done / total) * 100);
  }

  function coachingBadge(status) {
    const map = {
      completed: ['✓ Done in coaching', 'cb-done'],
      ongoing:   ['▶ In coaching now', 'cb-ongoing'],
      upcoming:  ['⏳ Not started yet', 'cb-upcoming'],
    };
    const [label, cls] = map[status] || map.upcoming;
    return `<span class="coach-badge ${cls}">${label}</span>`;
  }

  function renderSummary() {
    const sp = getSubjProgress();
    let totalItems = 0, doneItems = 0;
    SUBJECTS.forEach(s => {
      s.topics.forEach(t => {
        totalItems += 3;
        doneItems += (getSubjItemVal(t.id,'class',sp)?1:0) + (getSubjItemVal(t.id,'notes',sp)?1:0) + (getSubjItemVal(t.id,'book',sp)?1:0);
      });
    });
    const coaching_done = SUBJECTS.filter(s => s.coaching === 'completed').length;
    document.getElementById('summaryStats').innerHTML = `
      <div class="stat-card"><div class="value">${SUBJECTS.length}</div><div class="label">Total Subjects</div></div>
      <div class="stat-card"><div class="value" style="color:var(--accent2)">${coaching_done}</div><div class="label">Coaching Done</div></div>
      <div class="stat-card"><div class="value">${totalItems ? Math.round((doneItems/totalItems)*100) : 0}%</div><div class="label">Overall Progress</div></div>`;
  }

  function buildRow(t, sp, subjId) {
    const cls = getSubjItemVal(t.id,'class',sp);
    const notes = getSubjItemVal(t.id,'notes',sp);
    const book = getSubjItemVal(t.id,'book',sp);
    return `<tr>
      <td>${t.text}</td>
      <td><input type="checkbox" class="track-chk class-chk" ${cls?'checked':''} onchange="check('${t.id}','class','${subjId}')"></td>
      <td><input type="checkbox" class="track-chk notes-chk" ${notes?'checked':''} onchange="check('${t.id}','notes','${subjId}')"></td>
      <td><input type="checkbox" class="track-chk book-chk" ${book?'checked':''} onchange="check('${t.id}','book','${subjId}')"></td>
    </tr>`;
  }

  function renderSubjects() {

    container.innerHTML = SUBJECTS.map(s => {

          <div class="subj-header" onclick="toggleSubj('${s.id}')">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap">
                <span class="subj-title">${s.title}</span>
                ${coachingBadge(s.coaching)}
                <span style="font-size:0.72rem;color:var(--text-muted)">${s.paper}</span>
              </div>
              <div style="margin-top:0.4rem;display:flex;align-items:center;gap:0.6rem">
                <div style="flex:1;background:var(--border);border-radius:99px;height:4px;max-width:200px">
                  <div id="spbar-${s.id}" style="height:4px;border-radius:99px;background:${s.color};width:${pct}%;transition:width 0.3s"></div>
                </div>
                <span id="sppct-${s.id}" style="font-size:0.75rem;color:var(--text-muted)">${pct}%</span>
              </div>
            </div>
            <span style="color:var(--text-muted);font-size:0.8rem;margin-left:0.5rem" id="arrow-${s.id}">▸</span>
          </div>
          <div class="subj-body" id="sb-${s.id}">
            <div style="padding:0.75rem 1.25rem;font-size:0.78rem;color:var(--text-muted);background:var(--surface2)">
              📚 Books: ${s.books.join(' · ')}
            </div>
            <div style="overflow-x:auto">
              <table class="track-table">
                <thead>
                  <tr>
                    <th style="text-align:left">Topic</th>
                    <th><div class="col-header-wrap"><div class="col-dot" style="background:#6c8ef5"></div><span class="col-label">Class Done</span></div></th>
                    <th><div class="col-header-wrap"><div class="col-dot" style="background:#52c99e"></div><span class="col-label">Notes Revised</span></div></th>
                    <th><div class="col-header-wrap"><div class="col-dot" style="background:#f5a623"></div><span class="col-label">Book Read</span></div></th>
                  </tr>
                </thead>
                <tbody id="tbody-${s.id}">
                  ${s.topics.map(t => buildRow(t, sp, s.id)).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleSubj(id) {
    const body = document.getElementById('sb-' + id);
    const arrow = document.getElementById('arrow-' + id);
    const header = body.previousElementSibling;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('open', !isOpen);
    arrow.textContent = isOpen ? '▸' : '▾';
  }

  function check(topicId, type, subjId) {
    toggleSubjItem(topicId, type);
    // Update just this subject's progress bar
    const sp = getSubjProgress();
    const subj = SUBJECTS.find(s => s.id === subjId);
    if (subj) {
      const pct = pctFor(subj, sp);
      const bar = document.getElementById('spbar-' + subjId);
      const label = document.getElementById('sppct-' + subjId);
      if (bar) bar.style.width = pct + '%';
      if (label) label.textContent = pct + '%';
    }
    renderSummary();
  }

  renderSummary();
  renderSubjects();
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
