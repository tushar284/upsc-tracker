<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UPSC">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <title>UPSC Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Overall Progress ── */
    .overall-card { padding: 1rem 1.25rem; }
    .overall-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .overall-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .overall-pct { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .overall-bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 0.6rem; }
    .overall-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%); transition: width 0.6s ease; }
    .overall-breakdown { display: flex; gap: 1rem; flex-wrap: wrap; }
    .ob-item { font-size: 0.78rem; color: var(--text-muted); }
    .ob-item strong { color: var(--text); }

    /* ── Day info ── */
    .day-info { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .day-badge { font-size: 0.75rem; padding: 0.2rem 0.7rem; border-radius: 99px; }
    .badge-class { background: #183d30; color: var(--accent2); }
    .badge-office { background: #1d2550; color: #7b9ef5; }
    .badge-ca { background: #3d1f4a; color: #c77dff; }

    /* ── Task list ── */
    .task-card {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.8rem 1rem; border-radius: 8px;
      background: var(--surface2); margin-bottom: 0.5rem;
      cursor: pointer; transition: background 0.15s;
      border: 1px solid transparent;
    }
    .task-card:hover { background: var(--border); }
    .task-card.done { background: #152b22; border-color: #2d6b50; }
    .task-card.done .task-label { text-decoration: line-through; color: var(--text-muted); }
    .task-card.done .task-time { color: #2d6b50; }
    .task-check {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
      accent-color: var(--accent2); cursor: pointer;
    }
    .task-meta { flex: 1; }
    .task-time { font-size: 0.73rem; color: var(--accent); margin-bottom: 2px; }
    .task-label { font-size: 0.88rem; }
    .task-msg { margin-top: 0.6rem; font-size: 0.82rem; min-height: 1.1em; color: var(--accent2); }
    .task-progress { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; }

    /* ── History grid ── */
    .history-scroll { padding-bottom: 4px; }
    .history-grid { display: inline-grid; grid-auto-flow: column; grid-template-rows: repeat(7, 1fr); gap: 3px; }
    .hg-header-row { display: inline-grid; grid-template-columns: repeat(auto-fill, 18px); gap: 3px; margin-bottom: 3px; }
    .hg-col-label { font-size: 0.6rem; color: var(--text-muted); text-align: center; text-transform: uppercase; }
    .hg-cell {
      width: 18px; height: 18px; border-radius: 3px; background: var(--border);
      cursor: pointer; transition: opacity 0.1s; position: relative;
    }
    .hg-cell:hover { opacity: 0.8; }
    .hg-cell.hg-full { background: var(--accent2); }
    .hg-cell.hg-partial { background: #3d2e10; }
    .hg-cell.hg-today { outline: 2px solid var(--accent); outline-offset: 1px; }
    .hg-cell.hg-selected { outline: 2px solid #fff; outline-offset: 1px; }
    .hg-legend { display: flex; gap: 0.75rem; margin-top: 0.5rem; font-size: 0.72rem; color: var(--text-muted); align-items: center; }
    .hg-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }

    /* ── Day detail panel ── */
    .day-detail { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .dd-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .dd-title { font-size: 0.9rem; font-weight: 600; }
    .dd-close { font-size: 0.8rem; color: var(--text-muted); cursor: pointer; padding: 0.2rem 0.5rem; }
    .dd-close:hover { color: var(--text); }
    .dd-task {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.55rem 0.75rem; border-radius: 6px;
      background: var(--surface2); margin-bottom: 0.4rem; cursor: pointer;
      border: 1px solid transparent;
    }
    .dd-task.done { background: #152b22; border-color: #2d6b50; }
    .dd-task.done .dd-label { text-decoration: line-through; color: var(--text-muted); }
    .dd-task.done .dd-time { color: #2d6b50; }
    .dd-check { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; accent-color: var(--accent2); cursor: pointer; }
    .dd-meta { flex: 1; }
    .dd-time { font-size: 0.7rem; color: var(--accent); margin-bottom: 1px; }
    .dd-label { font-size: 0.82rem; }
    .dd-remaining { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.5rem; }

    /* ── Quick links ── */
    .quick-links { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-top: 0.75rem; }
    .ql-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.9rem; text-align: center;
      text-decoration: none; color: var(--text); transition: border-color 0.15s;
    }
    .ql-card:hover { border-color: var(--accent); }
    .ql-card .ql-icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }
    .ql-card .ql-label { font-size: 0.8rem; color: var(--text-muted); }
    .ql-card .ql-val { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    @media(max-width:480px){ .quick-links { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">📚 UPSC</span>
    <a href="index.html" class="active">Dashboard</a>
    <a href="schedule.html">Planner</a>
    <a href="course.html">Course</a>
    <a href="topics.html">Topics</a>
    <a href="subjects.html">Subjects</a>
  </nav>

  <main>
    <!-- Day header -->
    <div class="day-info">
      <h1 id="dayHeading" style="margin:0;font-size:1.4rem"></h1>
      <span id="dateLabel" style="color:var(--text-muted);font-size:0.9rem"></span>
      <span id="badge1" class="day-badge" style="display:none"></span>
      <span id="badge2" class="day-badge" style="display:none"></span>
    </div>

    <!-- Overall progress -->
    <div class="card overall-card">
      <div class="overall-header">
        <span class="overall-title">Overall Progress</span>
        <span class="overall-pct" id="overallPct">0%</span>
      </div>
      <div class="overall-bar-track">
        <div class="overall-bar-fill" id="overallBar" style="width:0%"></div>
      </div>
      <div class="overall-breakdown">
        <span class="ob-item">Syllabus <strong id="obSyllabus">0%</strong></span>
        <span class="ob-item" style="color:var(--border)">|</span>
        <span class="ob-item">Course <strong id="obCourse">0%</strong></span>
        <span class="ob-item" style="color:var(--border)">|</span>
        <span class="ob-item">Consistency <strong id="obConsistency">0%</strong></span>
      </div>
    </div>

    <!-- Today's tasks -->
    <div class="card">
      <h2 style="margin-bottom:0.6rem">Today's Tasks</h2>
      <div id="tasksList"></div>
      <div class="task-msg" id="taskMsg"></div>
      <div class="task-progress" id="taskProgress"></div>
    </div>

    <!-- Streak & History -->
    <div class="card">
      <h2 style="margin-bottom:0.75rem">Streak &amp; History</h2>
      <div style="display:flex;gap:6px;align-items:flex-start">
        <div id="historyDayLabels" style="display:flex;flex-direction:column;gap:3px;flex-shrink:0"></div>
        <div class="history-scroll" style="overflow-x:auto;flex:1">
          <div class="history-grid" id="historyGrid"></div>
        </div>
      </div>
      <div class="hg-legend">
        <span><span class="hg-swatch" style="background:var(--accent2)"></span>All done</span>
        <span><span class="hg-swatch" style="background:#3d2e10"></span>Partial</span>
        <span><span class="hg-swatch" style="background:var(--border)"></span>None</span>
      </div>
      <!-- Day detail panel (shown on cell click) -->
      <div class="day-detail" id="dayDetail" style="display:none">
        <div class="dd-header">
          <span class="dd-title" id="ddTitle"></span>
          <span class="dd-close" onclick="closeDayDetail()">✕ close</span>
        </div>
        <div id="ddTasks"></div>
        <div class="dd-remaining" id="ddRemaining"></div>
      </div>
    </div>

    <!-- Quick stats -->
    <div class="quick-links" id="quickLinks"></div>
  </main>

  <script src="js/storage.js"></script>
  <script src="data/syllabus.js"></script>
  <script>
    const today = todayISO();
    const dayName = getDayName(today);

    // ── Schedules ──────────────────────────────────────────────────────────────
    const schedules = {
      Monday:    [['6:30–7:20 AM','✍️ Answer writing — 1 UPSC question'],['10:30 AM–6 PM','🏢 Office'],['6:00–7:30 PM','📖 Revision: last class topic OR Anthropology'],['9:00–10:30 PM','📰 Current Affairs (The Hindu + PIB notes)']],
      Tuesday:   [['6:30–7:20 AM','🔁 Revise yesterday\'s notes / flashcards'],['7:30–10:30 AM','📡 Next IAS Live Class'],['10:30 AM–6 PM','🏢 Office'],['6:00–7:30 PM','📝 Today\'s class notes — revise within 6 hrs'],['9:00–10:30 PM','📰 CA + Anthropology reading']],
      Wednesday: [['6:30–7:20 AM','✍️ Answer writing — 1 question from class topic'],['7:30–10:30 AM','📡 Next IAS Live Class'],['10:30 AM–6 PM','🏢 Office'],['6:00–7:30 PM','✍️ Answer writing + class notes revision'],['9:00–10:30 PM','📰 CA + Anthropology']],
      Thursday:  [['6:30–7:20 AM','✍️ Answer writing — Anthropology (Paper I theory)'],['10:30 AM–6 PM','🏢 Office'],['6:00–7:30 PM','📖 Anthropology deep study (Theories / Kinship)'],['9:00–10:30 PM','📰 CA: compile weekly notes']],
      Friday:    [['6:30–7:20 AM','🔁 Weekly revision consolidation — skim Mon–Thu notes'],['10:30 AM–6 PM','🏢 Office'],['6:00–8:00 PM','📖 Anthropology extended session (Paper II)'],['9:00–10:00 PM','📰 CA wrap-up; prep Sunday CA class material 🌙']],
      Saturday:  [['6:30–7:15 AM','🔁 Light warm-up — revise last 2 classes'],['7:30–10:30 AM','📡 Next IAS Live Class'],['11 AM–1:30 PM','📝 Consolidate notes + 2 answer writings'],['2:00–5:00 PM','📖 Anthropology deep dive — 1 full unit']],
      Sunday:    [['7:30–10:30 AM','📡 Next IAS Live Class'],['11 AM–1 PM','🍽️ Rest / light revision'],['1:30–5:00 PM','📡 Next IAS Weekly CA Class (Live)'],['6:00–7:30 PM','📰 Compile CA notes'],['7:30–8:30 PM','🗓️ Plan next week — topics, Anthro units, answer themes']]
    };

    // ── Day header ─────────────────────────────────────────────────────────────
    document.getElementById('dayHeading').textContent = dayName;
    document.getElementById('dateLabel').textContent = formatDate(today);

    const badges = [];
    if (isClassDay(today)) badges.push({ label: '📡 Class Day', cls: 'badge-class' });
    if (isOfficeDay(today)) badges.push({ label: '🏢 Office', cls: 'badge-office' });
    if (dayName === 'Sunday') badges.push({ label: '📺 CA Class 1:30 PM', cls: 'badge-ca' });
    if (badges[0]) { const b = document.getElementById('badge1'); b.textContent = badges[0].label; b.className = 'day-badge ' + badges[0].cls; b.style.display = ''; }
    if (badges[1]) { const b = document.getElementById('badge2'); b.textContent = badges[1].label; b.className = 'day-badge ' + badges[1].cls; b.style.display = ''; }

    // ── Overall Progress ───────────────────────────────────────────────────────
    function computeOverallProgress() {
      const S = window.SYLLABUS;
      const done = getTopicsDone().size;
      let total = 0;
      [S.prelims, S.csat, S.gs1, S.gs2, S.gs3, S.gs4].forEach(s => s.units.forEach(u => total += u.topics.length));
      S.anthropology.paper1.units.forEach(u => total += u.topics.length);
      S.anthropology.paper2.units.forEach(u => total += u.topics.length);
      const syllabusP = total ? done / total : 0;

      const modules = S.nextias_modules;
      const overrides = getModuleStatuses();
      const completedMods = modules.filter(m => (overrides[m.id] || m.status) === 'completed').length;
      const courseP = modules.length ? completedMods / modules.length : 0;

      const allTasks = getDailyTasksAll();
      const goodDays = allTasks.filter(d => {
        const slots = schedules[getDayName(d.date)] || [];
        return d.done.filter(Boolean).length >= 1;
      }).length;
      const consistencyP = allTasks.length ? goodDays / allTasks.length : 0;

      const overall = Math.round((0.5 * syllabusP + 0.3 * courseP + 0.2 * consistencyP) * 100);
      return { overall, syllabusP, courseP, consistencyP };
    }

    function renderOverallProgress() {
      const { overall, syllabusP, courseP, consistencyP } = computeOverallProgress();
      document.getElementById('overallPct').textContent = overall + '%';
      document.getElementById('overallBar').style.width = overall + '%';
      document.getElementById('obSyllabus').textContent = Math.round(syllabusP * 100) + '%';
      document.getElementById('obCourse').textContent = Math.round(courseP * 100) + '%';
      document.getElementById('obConsistency').textContent = Math.round(consistencyP * 100) + '%';
    }

    // ── Today's Tasks ──────────────────────────────────────────────────────────
    function renderTodayTasks() {
      const slots = schedules[dayName] || [];
      const { done } = getTasksForDate(today);
      const total = slots.length;
      const doneCount = done.filter(Boolean).length;

      document.getElementById('tasksList').innerHTML = slots.map(([time, task], i) => {
        const isDone = !!done[i];
        return `<div class="task-card ${isDone ? 'done' : ''}" id="tc_${i}" onclick="toggleTask(${i})">
          <input type="checkbox" class="task-check" id="t_${i}" ${isDone ? 'checked' : ''} onclick="event.stopPropagation();toggleTask(${i})">
          <div class="task-meta">
            <div class="task-time">${time}</div>
            <div class="task-label">${task}</div>
          </div>
        </div>`;
      }).join('');

      updateTaskMsg(doneCount, total);
      const remaining = slots.slice().map(([,t], i) => done[i] ? null : t).filter(Boolean);
      document.getElementById('taskProgress').textContent = total
        ? `${doneCount} of ${total} done${remaining.length ? ' · ' + remaining.length + ' remaining' : ''}`
        : '';
    }

    function toggleTask(idx) {
      const entry = getTasksForDate(today);
      const slots = schedules[dayName] || [];
      const done = Array.from({ length: slots.length }, (_, i) => !!entry.done[i]);
      done[idx] = !done[idx];
      saveTasksForDate(today, done);
      renderTodayTasks();
      renderHistoryGrid();
      renderOverallProgress();
    }

    const taskMsgs = {
      0: '', 1: '🌱 Started!', 2: '💪 Keep going!', 3: '🔥 More than halfway!',
      4: '⚡ Almost there!', 5: '🏆 Perfect day!', 6: '🏆 Perfect day!'
    };
    function updateTaskMsg(done, total) {
      const msg = done === 0 ? '' : done === total ? '🏆 Perfect day!' : taskMsgs[done] || '💪 Keep going!';
      document.getElementById('taskMsg').textContent = msg;
    }

    // ── History grid ───────────────────────────────────────────────────────────
    let selectedDay = null;

    function renderHistoryGrid() {
      const allTasks = getDailyTasksAll();

      // Determine date range: from earliest tracked day (or 90 days ago) to today
      const dates = allTasks.map(t => t.date).sort();
      const earliest = dates.length
        ? new Date(Math.min(new Date(dates[0] + 'T00:00:00'), new Date(Date.now() - 89 * 864e5)))
        : new Date(Date.now() - 6 * 864e5);

      // Align to the start of the week (Monday)
      const startDay = new Date(earliest);
      const dow = startDay.getDay(); // 0=Sun
      const mondayOffset = dow === 0 ? 6 : dow - 1; // days back to last Monday
      startDay.setDate(startDay.getDate() - mondayOffset);

      const todayDate = new Date(today + 'T00:00:00');
      const taskMap = {};
      allTasks.forEach(t => { taskMap[t.date] = t; });

      // Build weeks array
      const weeks = [];
      let cur = new Date(startDay);
      let week = [];
      while (cur <= todayDate) {
        const iso = cur.toISOString().slice(0, 10);
        week.push(iso);
        if (week.length === 7) { weeks.push(week); week = []; }
        cur.setDate(cur.getDate() + 1);
      }
      if (week.length) {
        while (week.length < 7) week.push(null);
        weeks.push(week);
      }

      // Row labels: Mon–Sun stacked vertically beside the grid
      document.getElementById('historyDayLabels').innerHTML =
        ['M','T','W','T','F','S','S'].map(l =>
          `<span style="width:18px;height:18px;font-size:0.6rem;color:var(--text-muted);display:flex;align-items:center;justify-content:center">${l}</span>`
        ).join('');

      // Grid: 7 rows (Mon-Sun) × N weeks columns
      const grid = document.getElementById('historyGrid');
      grid.style.gridTemplateRows = 'repeat(7, 18px)';
      grid.innerHTML = '';

      weeks.forEach(week => {
        week.forEach(iso => {
          const cell = document.createElement('div');
          if (!iso) {
            cell.style.width = '18px'; cell.style.height = '18px';
            grid.appendChild(cell);
            return;
          }
          const t = taskMap[iso];
          const slots = schedules[getDayName(iso)] || [];
          const doneCount = t ? t.done.filter(Boolean).length : 0;
          const total = slots.length;
          let cls = '';
          if (doneCount === total && total > 0) cls = 'hg-full';
          else if (doneCount > 0) cls = 'hg-partial';

          cell.className = 'hg-cell' + (cls ? ' ' + cls : '') +
            (iso === today ? ' hg-today' : '') +
            (iso === selectedDay ? ' hg-selected' : '');
          cell.title = iso + (total ? ` — ${doneCount}/${total} tasks` : '');
          cell.onclick = () => openDayDetail(iso);
          grid.appendChild(cell);
        });
      });
    }

    function openDayDetail(date) {
      selectedDay = date;
      renderHistoryGrid();

      const slots = schedules[getDayName(date)] || [];
      const entry = getTasksForDate(date);
      const done = Array.from({ length: slots.length }, (_, i) => !!entry.done[i]);
      const doneCount = done.filter(Boolean).length;
      const remaining = slots.filter((_, i) => !done[i]);

      document.getElementById('ddTitle').textContent = getDayName(date) + ', ' + formatDate(date);
      document.getElementById('ddTasks').innerHTML = slots.map(([time, task], i) =>
        `<div class="dd-task ${done[i] ? 'done' : ''}" id="dd_${i}" onclick="toggleDayTask('${date}',${i})">
          <input type="checkbox" class="dd-check" id="ddc_${i}" ${done[i] ? 'checked' : ''} onclick="event.stopPropagation();toggleDayTask('${date}',${i})">
          <div class="dd-meta">
            <div class="dd-time">${time}</div>
            <div class="dd-label">${task}</div>
          </div>
        </div>`
      ).join('');

      document.getElementById('ddRemaining').textContent = remaining.length
        ? `Remaining (${remaining.length}): ${remaining.map(([,t]) => t.replace(/^[^\s]+ /, '')).join(' · ')}`
        : doneCount === slots.length && slots.length > 0 ? '✅ All tasks completed for this day!' : '';

      document.getElementById('dayDetail').style.display = '';
    }

    function toggleDayTask(date, idx) {
      const entry = getTasksForDate(date);
      const slots = schedules[getDayName(date)] || [];
      const done = Array.from({ length: slots.length }, (_, i) => !!entry.done[i]);
      done[idx] = !done[idx];
      saveTasksForDate(date, done);
      openDayDetail(date);
      renderHistoryGrid();
      if (date === today) renderTodayTasks();
      renderOverallProgress();
    }

    function closeDayDetail() {
      selectedDay = null;
      document.getElementById('dayDetail').style.display = 'none';
      renderHistoryGrid();
    }

    // ── Quick stats ────────────────────────────────────────────────────────────
    function renderQuickStats() {
      const streak = computeStreak();
      const done = getTopicsDone().size;
      let total = 0;
      const S = window.SYLLABUS;
      [S.prelims, S.csat, S.gs1, S.gs2, S.gs3, S.gs4].forEach(s => s.units.forEach(u => total += u.topics.length));
      S.anthropology.paper1.units.forEach(u => total += u.topics.length);
      S.anthropology.paper2.units.forEach(u => total += u.topics.length);
      const pct = total ? Math.round((done / total) * 100) : 0;
      const modules = S.nextias_modules;
      const overrides = getModuleStatuses();
      const completed = modules.filter(m => (overrides[m.id] || m.status) === 'completed').length;

      document.getElementById('quickLinks').innerHTML = `
        <a href="course.html" class="ql-card">
          <span class="ql-icon">🎓</span>
          <div class="ql-val">${completed}/${modules.length}</div>
          <div class="ql-label">Course modules</div>
        </a>
        <a href="topics.html" class="ql-card">
          <span class="ql-icon">📋</span>
          <div class="ql-val">${pct}%</div>
          <div class="ql-label">Syllabus done</div>
        </a>
        <a href="subjects.html" class="ql-card">
          <span class="ql-icon">🔥</span>
          <div class="ql-val">${streak}</div>
          <div class="ql-label">Day streak</div>
        </a>`;
    }

    renderOverallProgress();
    renderTodayTasks();
    renderHistoryGrid();
    renderQuickStats();
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
